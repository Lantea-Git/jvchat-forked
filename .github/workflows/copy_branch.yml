name: Sync JVChat_Premium to debug
# .github/workflows/copy_branch.yml
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync to fork-of-fork and debug
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

          for branch in fork-of-fork debug; do
            git checkout $branch
            curl -L "https://update.greasyfork.org/scripts/576263/JV_Chat_Custsom_Fork.user.js" \
              -o JVChat_Premium.user.js
            git add JVChat_Premium.user.js
            git commit -m "sync" || echo "Rien à committer sur $branch"
            git push origin $branch
          done

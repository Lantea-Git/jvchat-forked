name: Push commit
# .github/workflows/copy_branch.yml
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync to fork-of-fork and debug
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

          for branch in test; do
            git checkout $branch

            curl -L "https://update.greasyfork.org/scripts/471322.user.js" -o raw.user.js
            python3 .github/workflows/copy_branch_patch_header.py raw.user.js JVChat_Premium.user.js
            rm raw.user.js

            git add JVChat_Premium.user.js
            git commit -m "push" || echo "Rien à committer sur $branch"
            git push origin $branch
          done
